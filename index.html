<!-- 
    Q What is React CDN?
    Answer => React CDN means loading React library directly from a Content Delivery Network using script tags
        instead of installing it locally via npm. It is mainly used for quick demos and small projects.

    Q What is crossorigin?
    Answer => crossorigin is an HTML attribute used when loading resources (JS, CSS, images, fonts) from another domain.
-->
    <!-- Here scripts order matters -->
    <!-- Not Needed as intalled react & react-dom in the project.
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> -->
